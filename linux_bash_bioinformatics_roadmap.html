
<style>

<script>
const phases = [
  {
    id: "p1", num: "01", cls: "p1",
    title: "The Linux Foundation",
    meta: "Absolute beginner — learn to navigate the shell",
    weeks: "Week 1–2", pct: 20,
    note: "Every bioinformatics tool runs here. You cannot skip this phase.",
    topics: [
      { name: "What is Linux & the Terminal", tag: "core", tagCls: "tag-core",
        desc: "Shell vs GUI, why bioinformatics uses Linux",
        cmd: "# Open terminal and run your first command\necho 'Hello Bioinformatics!'\n\n# Check your Linux version\nuname -a\n\n# Who am I?\nwhoami\n\n# What is my current directory?\npwd",
        why: "All bioinformatics tools (BWA, STAR, samtools, etc.) are command-line only. There is no 'double click' in genomics. The terminal IS your lab bench." },

      { name: "Navigating Directories", tag: "core", tagCls: "tag-core",
        desc: "ls, cd, pwd, mkdir — moving around the filesystem",
        cmd: "pwd                   # Print Working Directory\nls                    # List files\nls -lh                # List with size in human-readable\nls -la                # Show hidden files too\ncd /home/user/data    # Go to directory\ncd ..                 # Go one level up\ncd ~                  # Go to home directory\nmkdir my_project      # Create new folder\nmkdir -p data/raw     # Create nested folders",
        why: "You will organize projects with hundreds of files. A genomics project has: raw_data/, trimmed/, aligned/, counts/, results/. Navigating fast is essential." },

      { name: "Files — Create, Copy, Move, Delete", tag: "core", tagCls: "tag-core",
        desc: "touch, cp, mv, rm — essential file operations",
        cmd: "touch sample.txt         # Create empty file\ncp file.txt backup.txt   # Copy a file\ncp -r folder/ backup/    # Copy entire folder\nmv old.txt new.txt       # Rename / move file\nmv file.txt ../          # Move to parent dir\nrm file.txt              # Delete file (careful!)\nrm -rf old_folder/       # Delete folder (CAREFUL!)\n\n# Tip: never rm -rf without double-checking!",
        why: "You will constantly copy reference genomes, move result files, rename samples. These 5 commands are used dozens of times every day." },

      { name: "Reading & Viewing Files", tag: "bio", tagCls: "tag-bio",
        desc: "cat, head, tail, less, wc — inspecting biological data files",
        cmd: "cat sequence.fa           # Print whole file\nhead -5 reads.fastq       # First 5 lines\ntail -20 results.txt      # Last 20 lines\nless genome.fa            # Scroll (q to quit)\nwc -l genes.bed           # Count lines\nwc -c file.fa             # Count characters (bytes)\n\n# Count sequences in FASTA file:\ngrep -c '^>' genome.fa\n\n# View first 4 lines of FASTQ (= 1 read):\nhead -4 sample.fastq",
        why: "FASTQ files have 4 lines per read. FASTA sequences start with >. You'll check file integrity, count reads, and inspect outputs constantly. wc -l is used every single day." },

      { name: "File Permissions & Paths", tag: "core", tagCls: "tag-core",
        desc: "chmod, absolute vs relative paths, PATH variable",
        cmd: "ls -l file.sh          # See permissions: -rwxr-xr-x\nchmod +x script.sh     # Make script executable\nchmod 755 script.sh    # Set rwxr-xr-x\n\n# Absolute path (starts from root)\n/home/user/data/genome.fa\n\n# Relative path (from where you are)\n./data/genome.fa\n../results/output.txt\n\n# Check your PATH\necho $PATH\nwhich samtools         # Where is samtools installed?",
        why: "Pipeline scripts need to be executable. Tools need to be in PATH. This breaks jobs constantly for beginners — understanding it saves hours of debugging." },
    ]
  },
  {
    id: "p2", num: "02", cls: "p2",
    title: "Text Processing Powertools",
    meta: "The core of bioinformatics data manipulation",
    weeks: "Week 3–4", pct: 35,
    note: "grep, awk, sed and pipes are used in EVERY bioinformatics workflow. Master these and you can analyze data without writing Python.",
    topics: [
      { name: "grep — Search & Filter", tag: "bio", tagCls: "tag-bio",
        desc: "Pattern matching in FASTQ, FASTA, VCF, BED files",
        cmd: "# Find lines matching a pattern\ngrep 'ATGCGT' reads.fastq\n\n# Count matching lines (-c)\ngrep -c '^>' genome.fa      # Count FASTA sequences\n\n# Case insensitive (-i)\ngrep -i 'gene' annotation.gff\n\n# Show line numbers (-n)\ngrep -n 'chrX' variants.vcf\n\n# Invert match (-v) — exclude lines\ngrep -v '^#' variants.vcf   # Remove VCF header lines\n\n# Extended regex (-E)\ngrep -E 'BRCA1|BRCA2' genes.txt\n\n# Search recursively in a folder (-r)\ngrep -r 'error' logs/",
        why: "Genomics files have millions of lines. grep lets you instantly filter: remove VCF headers, count sequences, find specific chromosomes, extract gene records from GFF." },

      { name: "cut, sort, uniq — Data Columns", tag: "stat", tagCls: "tag-stat",
        desc: "Extract columns, sort data, count occurrences",
        cmd: "# cut: extract columns (tab-delimited by default)\ncut -f1,2,3 variants.vcf   # Columns 1,2,3\ncut -f1 -d',' data.csv      # CSV, column 1\n\n# sort: order data\nsort -k1,1 -k2,2n bed.bed   # Sort by chr then by position (numeric)\nsort -k9,9gr results.txt    # Sort column 9, numeric, reverse\n\n# uniq: unique lines (file must be sorted first)\nsort chromosomes.txt | uniq           # Unique chromosomes\nsort chromosomes.txt | uniq -c        # Count occurrences\nsort chromosomes.txt | uniq -c | sort -rn  # Most common first\n\n# Real example: count reads per chromosome\ncut -f3 aligned.sam | sort | uniq -c | sort -rn",
        why: "You'll extract gene IDs from column 3 of GFF files, sort variants by genomic position, count how many reads map to each chromosome. These 3 commands are your first statistics tools." },

      { name: "awk — Row & Column Algebra", tag: "stat", tagCls: "tag-stat",
        desc: "Field-based filtering and calculations on tabular files",
        cmd: "# Basic syntax: awk 'condition {action}' file\n\n# Print specific columns\nawk '{print $1, $3, $5}' data.txt\n\n# Filter rows where column 5 > 30 (mapping quality)\nawk '$5 > 30' aligned.sam\n\n# Calculate GC content from a simple table\nawk '{gc += $2; total += $3} END {print gc/total*100}' gc_stats.txt\n\n# Print lines where chromosome is chr1\nawk '$1 == \"chr1\"' variants.bed\n\n# Calculate BED file region lengths\nawk '{print $3 - $2}' regions.bed | sort -n\n\n# Skip header line (NR = row number)\nawk 'NR>1 {print $1, $4}' expression.tsv\n\n# Count fields per line (for QC)\nawk '{print NF}' file.tsv | sort | uniq -c",
        why: "awk is a mini programming language built into Linux. For bioinformatics: filter by mapping quality, calculate region lengths from BED files, compute per-sample statistics. Often faster than Python for large files." },

      { name: "sed — Find & Replace", tag: "core", tagCls: "tag-core",
        desc: "Stream editing — rename chromosomes, fix file formats",
        cmd: "# Replace text (s = substitute)\nsed 's/old/new/' file.txt       # Replace first occurrence per line\nsed 's/old/new/g' file.txt      # Replace ALL occurrences\n\n# In-place editing (-i saves the file)\nsed -i 's/chr//' genome.fa      # Remove 'chr' prefix from chromosome names\n\n# Delete lines matching a pattern\nsed '/^#/d' variants.vcf        # Delete VCF comment lines\n\n# Print specific line numbers\nsed -n '10,20p' file.txt        # Print lines 10–20\n\n# Real use: fix chromosome naming (UCSC vs Ensembl)\n# UCSC uses chr1, chr2; Ensembl uses 1, 2\nsed 's/^chr//' ucsc_genome.fa > ensembl_genome.fa\nsed 's/^/chr/' ensembl.bed > ucsc.bed",
        why: "The most common real-world use: chromosome naming differences between databases (chr1 vs 1). This breaks alignments silently. sed fixes it in one command." },

      { name: "Pipes & Redirection", tag: "core", tagCls: "tag-core",
        desc: "| > >> 2> — chaining commands, saving output",
        cmd: "# Pipe: send output of one command into the next\ncat reads.fastq | grep '^+' | wc -l\n\n# Redirect output to a file (overwrite)\ngrep '^>' genome.fa > sequence_ids.txt\n\n# Append to a file (don't overwrite)\necho 'sample2 done' >> progress_log.txt\n\n# Redirect errors (stderr)\nbwa mem ref.fa reads.fq > aligned.sam 2> bwa_errors.log\n\n# Redirect both stdout and stderr\nstar --runMode alignReads ... > run.log 2>&1\n\n# Real pipeline:\ncat sample.fastq | grep -A3 'ATGCGT' | grep -v '^--' | wc -l",
        why: "Pipes are how bioinformatics pipelines work. Instead of saving huge intermediate files, you chain: align → sort → index → call variants. This saves disk space and time." },

      { name: "tr, paste, join — Column Tools", tag: "stat", tagCls: "tag-stat",
        desc: "Transpose, merge files by key, translate characters",
        cmd: "# tr: translate/delete characters\necho 'ATGCTAGC' | tr 'ATGC' 'TACG'   # Complement DNA strand\ntr '[:lower:]' '[:upper:]' < seq.txt   # Uppercase\ntr -d '\\n' < seq.txt                   # Remove newlines (join lines)\ntr -s ' ' '\\t' < data.txt              # Replace spaces with tabs\n\n# paste: merge files side by side\npaste sample_ids.txt expression.txt > combined.tsv\npaste -d',' file1.txt file2.txt         # Use comma as delimiter\n\n# join: merge files on a shared key column (like SQL JOIN)\nsort -k1 expr.tsv > expr_sorted.tsv\nsort -k1 meta.tsv > meta_sorted.tsv\njoin expr_sorted.tsv meta_sorted.tsv > merged.tsv",
        why: "tr is how you compute reverse complement of DNA. paste merges expression data with metadata. join is how you link gene IDs to annotations — critical before any statistical analysis." },
    ]
  },
  {
    id: "p3", num: "03", cls: "p3",
    title: "Bash Scripting & Automation",
    meta: "Write scripts that process thousands of samples automatically",
    weeks: "Week 5–6", pct: 50,
    note: "A script you write once can process 1000 samples overnight. This is where bioinformatics productivity multiplies.",
    topics: [
      { name: "Variables & Script Structure", tag: "core", tagCls: "tag-core",
        desc: "#!/bin/bash, variables, script arguments $1 $2",
        cmd: "#!/bin/bash\n# Always start with this 'shebang' line\n\n# Variables (no spaces around =)\nSAMPLE='sample01'\nTHREADS=8\nREF=/data/reference/hg38.fa\n\n# Use variables with $\necho \"Processing: $SAMPLE\"\necho \"Using $THREADS threads\"\n\n# Script arguments ($1 = first arg, $2 = second)\n# Usage: ./process.sh sample01 8\nSAMPLE=$1\nTHREADS=$2\necho \"Sample: $SAMPLE, Threads: $THREADS\"\n\n# Run it:\nchmod +x process.sh\n./process.sh sample01 8",
        why: "Instead of running the same BWA command 100 times with different sample names, you write one script with $SAMPLE as a variable, then loop over all samples. One script = 100 analyses." },

      { name: "Loops — for & while", tag: "core", tagCls: "tag-core",
        desc: "Process multiple samples, files, chromosomes automatically",
        cmd: "# for loop over a list\nfor SAMPLE in sample01 sample02 sample03; do\n  echo \"Processing $SAMPLE\"\n  bwa mem ref.fa ${SAMPLE}.fastq > ${SAMPLE}.sam\ndone\n\n# for loop over files (glob pattern)\nfor FILE in data/raw/*.fastq; do\n  BASENAME=$(basename $FILE .fastq)\n  echo \"Trimming: $BASENAME\"\ndone\n\n# Loop over chromosomes 1–22 + X + Y\nfor CHR in $(seq 1 22) X Y; do\n  echo \"Calling variants on chr${CHR}\"\ndone\n\n# while loop — read file line by line\nwhile read -r LINE; do\n  echo \"Sample: $LINE\"\ndone < sample_list.txt",
        why: "This is the #1 most used script in bioinformatics. A for loop over *.fastq files will align every sample in your study. What takes 2 hours manually takes 5 seconds to set up with a loop." },

      { name: "if/else — Conditional Logic", tag: "core", tagCls: "tag-core",
        desc: "Check if files exist, if steps completed, error handling",
        cmd: "# Check if a file exists before processing\nif [ -f \"aligned.bam\" ]; then\n  echo 'BAM exists, skipping alignment'\nelse\n  echo 'BAM missing, running alignment...'\n  bwa mem ref.fa reads.fastq > aligned.bam\nfi\n\n# Check if a directory exists\nif [ ! -d \"results/\" ]; then\n  mkdir -p results/\nfi\n\n# Check if a command succeeded ($? = exit code, 0 = success)\nbwa mem ref.fa reads.fastq > aligned.sam\nif [ $? -ne 0 ]; then\n  echo 'ERROR: BWA alignment failed!'\n  exit 1\nfi\n\n# String comparison\nif [ \"$GENOME\" == 'hg38' ]; then\n  REF=/data/hg38.fa\nelif [ \"$GENOME\" == 'mm10' ]; then\n  REF=/data/mm10.fa\nfi",
        why: "Pipelines crash halfway. A job farm runs 100 samples and 3 fail. if [ -f output.bam ] lets your script skip already-done samples and only re-run failed ones. Saves enormous compute time." },

      { name: "Functions & Modular Scripts", tag: "adv", tagCls: "tag-adv",
        desc: "Reusable code blocks, logging, error functions",
        cmd: "#!/bin/bash\n\n# Define a logging function\nlog() {\n  echo \"[$(date '+%Y-%m-%d %H:%M:%S')] $1\"\n}\n\n# Define an error-exit function\nerror_exit() {\n  echo \"ERROR: $1\" >&2\n  exit 1\n}\n\n# Run alignment function\nrun_alignment() {\n  local SAMPLE=$1\n  local THREADS=$2\n  log \"Starting alignment for $SAMPLE\"\n  bwa mem -t $THREADS $REF ${SAMPLE}.fastq \\\n    > ${SAMPLE}.sam \\\n    || error_exit \"Alignment failed for $SAMPLE\"\n  log \"Done: $SAMPLE\"\n}\n\n# Call the function\nrun_alignment 'sample01' 8\nrun_alignment 'sample02' 8",
        why: "Real pipelines have 10+ steps. Functions let you define run_alignment(), run_sorting(), run_variant_calling() once and reuse them. Makes scripts readable and maintainable." },

      { name: "xargs & parallel — Speed Up Jobs", tag: "adv", tagCls: "tag-adv",
        desc: "Run commands in parallel, process files concurrently",
        cmd: "# xargs: build command from stdin\nls *.fastq | xargs -I{} echo 'Processing: {}'\n\n# Run fastqc on all files with 4 parallel jobs\nls *.fastq | xargs -P4 -I{} fastqc {}\n\n# GNU parallel (even more powerful)\nparallel fastqc {} ::: *.fastq\n\n# Parallel with multiple args\nparallel bwa mem ref.fa {1} {2} ::: *.R1.fq :::+ *.R2.fq\n\n# Process chromosomes in parallel\nseq 1 22 | parallel \\\n  gatk HaplotypeCaller -I aligned.bam \\\n  -O chr{}.vcf -L chr{}",
        why: "A server with 32 CPUs sitting idle while you process one sample at a time wastes 97% of compute. GNU parallel turns a 32-hour job into a 1-hour job. This is the #1 performance trick." },

      { name: "Arrays & String Manipulation", tag: "adv", tagCls: "tag-adv",
        desc: "Bash arrays, basename/dirname, string operations",
        cmd: "# Bash arrays\nSAMPLES=(sample01 sample02 sample03)\necho ${SAMPLES[0]}         # First element\necho ${#SAMPLES[@]}        # Number of elements\n\nfor S in ${SAMPLES[@]}; do\n  echo \"Processing: $S\"\ndone\n\n# basename and dirname (essential for file handling)\nFILE='/data/raw/sample01.fastq.gz'\nbasename $FILE              # sample01.fastq.gz\nbasename $FILE .fastq.gz    # sample01  (strip extension)\ndirname $FILE               # /data/raw\n\n# String operations\nNAME='sample01_R1.fastq.gz'\necho ${NAME%.fastq.gz}      # Remove suffix: sample01_R1\necho ${NAME/_R1/_R2}        # Replace: sample01_R2.fastq.gz\necho ${NAME^^}              # Uppercase: SAMPLE01_R1.FASTQ.GZ",
        why: "basename strips extensions so 'sample01.fastq' becomes just 'sample01' — used to name output files. String replacement swaps _R1 with _R2 for paired-end reads. Essential for any real pipeline." },
    ]
  },
  {
    id: "p4", num: "04", cls: "p4",
    title: "Bioinformatics File Formats & Tools",
    meta: "FASTQ, FASTA, SAM/BAM, VCF, BED — the biological data languages",
    weeks: "Week 7–9", pct: 70,
    note: "These file formats ARE bioinformatics. Every downstream analysis starts with knowing these cold.",
    topics: [
      { name: "FASTA & FASTQ Format Mastery", tag: "bio", tagCls: "tag-bio",
        desc: "Sequence files, quality scores, read structure",
        cmd: "# FASTA format (2 lines per sequence)\n>gene_BRCA1 chromosome:17:43044295:43125483\nATGGATTTATCTGCTCTTCGCGTTGAAGAAGTACAAAT\n\n# FASTQ format (4 lines per read)\n@read_001 instrument:run:barcode\nATGCTAGCTAGCTAGCTAGCT    # sequence\n+                         # separator\nIIIIFHHHHHHGGGGGEEEE     # quality scores (ASCII)\n\n# Quality score conversion\n# ASCII 'I' = 73; 73 - 33 = Phred score 40 (Q40 = 99.99% accuracy)\n# ASCII 'F' = 70; 70 - 33 = Q37\n# Q20 = 99% accuracy (minimum acceptable)\n# Q30 = 99.9% (good)\n\n# Count reads in FASTQ\necho $(cat reads.fastq | wc -l) / 4 | bc\n\n# Check FASTQ is not corrupted\nawk 'NR%4==2{bases+=length($0)} END{print bases\" bases total\"}' reads.fastq",
        why: "FASTQ is the raw output of every DNA sequencer. You receive these files first. Understanding quality scores tells you which reads are reliable. Q30 is the standard quality threshold used in publications." },

      { name: "SAM & BAM — Alignment Files", tag: "bio", tagCls: "tag-bio",
        desc: "Aligned reads, FLAG field, samtools commands",
        cmd: "# SAM has 11 mandatory columns:\n# QNAME FLAG RNAME POS MAPQ CIGAR RNEXT PNEXT TLEN SEQ QUAL\n# read1   0   chr1  1000  60  100M  *    0    0  ATGC...  IIII...\n\n# FLAG field (bitwise): critical for filtering\n# 4   = unmapped read\n# 16  = reverse strand\n# 1024 = PCR duplicate\n\n# samtools — the most used bioinformatics tool:\n\n# Convert SAM to BAM (compressed)\nsamtools view -bS aligned.sam > aligned.bam\n\n# Sort BAM by genomic position\nsamtools sort aligned.bam -o sorted.bam\n\n# Index BAM (required for random access)\nsamtools index sorted.bam\n\n# Quick stats on alignment\nsamtools flagstat sorted.bam\n\n# Filter: only keep mapped, unique reads (MAPQ >= 20)\nsamtools view -bq 20 -F 4 sorted.bam > filtered.bam\n\n# Count properly paired reads\nsamtools view -c -f 2 sorted.bam",
        why: "SAM/BAM is the output of every aligner (BWA, STAR, HISAT2). samtools flagstat tells you alignment rate — below 80% means something is wrong with your data or reference. samtools is used in every single genomics pipeline." },

      { name: "VCF — Variant Call Format", tag: "bio", tagCls: "tag-bio",
        desc: "Genetic variants, INFO fields, filtering variants",
        cmd: "# VCF structure:\n# ##fileformat=VCFv4.2     (meta-information lines)\n# #CHROM POS ID REF ALT QUAL FILTER INFO FORMAT SAMPLE\n#  chr17 43071077 . G A 2800  PASS  DP=120;AF=0.48 GT:AD  0/1:62,58\n\n# Key fields:\n# QUAL: variant quality score (phred-scaled)\n# FILTER: PASS = good variant, other = filtered out\n# INFO/DP: total read depth at this position\n# INFO/AF: allele frequency\n# GT: genotype (0/0=homref, 0/1=het, 1/1=homalt)\n\n# Work with VCF using bcftools:\n\n# Count total variants\nbcftools stats variants.vcf | grep 'number of SNPs'\n\n# Filter: keep only PASS variants with depth > 10\nbcftools filter -i 'FILTER==\"PASS\" && INFO/DP>10' variants.vcf\n\n# Extract specific fields into a table\nbcftools query -f '%CHROM\\t%POS\\t%REF\\t%ALT\\t%INFO/DP\\n' variants.vcf\n\n# Count SNPs vs INDELs\nbcftools stats variants.vcf | grep '^SN'",
        why: "VCF is the universal format for genetic variants. GWAS, clinical genomics, cancer mutation analysis all output VCF. Knowing how to filter by QUAL, DP, FILTER separates good variants from noise — this is core statistical thinking." },

      { name: "BED, GFF, GTF — Genome Annotations", tag: "bio", tagCls: "tag-bio",
        desc: "Genomic coordinates, gene models, bedtools",
        cmd: "# BED format: chr, start (0-based), end, name, score, strand\nchr1  1000  2000  gene_A  0  +\nchr1  3000  4500  gene_B  0  -\n\n# GTF format (gene annotation, used by STAR/featureCounts)\n# chr1 HAVANA gene 11869 14409 . + . gene_id \"ENSG001\";\n# chr1 HAVANA exon 11869 12227 . + . gene_id \"ENSG001\"; exon_id \"ENSE001\";\n\n# bedtools — essential for coordinate arithmetic:\n\n# Find overlapping regions (intersect)\nbedtools intersect -a ChIP_peaks.bed -b genes.bed\n\n# Count reads overlapping each gene\nbedtools coverage -a genes.bed -b sorted.bam\n\n# Find features within 1kb of each gene\nbedtools window -a genes.bed -b enhancers.bed -w 1000\n\n# Subtract regions (remove blacklist)\nbedtools subtract -a peaks.bed -b blacklist.bed\n\n# Extract FASTA sequences for BED regions\nbedtools getfasta -fi genome.fa -bed regions.bed -fo sequences.fa",
        why: "bedtools intersect is how you ask 'which genes overlap my ChIP-seq peaks?' or 'how many variants fall in exons?'. These are the most common biological questions in genomics and they all require coordinate arithmetic on BED/GTF files." },

      { name: "Conda & Software Management", tag: "tool", tagCls: "tag-tool",
        desc: "Install bioinformatics tools without admin rights",
        cmd: "# Install conda (Miniconda — smaller, faster)\n# Download from: https://docs.conda.io/en/latest/miniconda.html\n\n# Create an isolated environment\nconda create -n rnaseq python=3.10\nconda activate rnaseq\n\n# Install tools from bioconda channel\nconda install -c bioconda -c conda-forge \\\n  fastqc trimmomatic star \\\n  subread samtools bcftools\n\n# Install a specific version\nconda install -c bioconda samtools=1.17\n\n# List installed tools\nconda list\n\n# Export environment for reproducibility\nconda env export > environment.yml\n\n# Recreate from yml (share with collaborators)\nconda env create -f environment.yml\n\n# Deactivate environment\nconda deactivate",
        why: "Bioinformatics tools often conflict (they need different Python/library versions). Conda creates isolated environments so fastqc, bwa, star, samtools all coexist peacefully. Without conda you spend days debugging installation errors." },

      { name: "Process Monitoring & HPC", tag: "tool", tagCls: "tag-tool",
        desc: "top, htop, screen, SLURM job scheduler",
        cmd: "# Monitor running processes\ntop                    # Basic process monitor\nhtop                   # Better interactive version (install separately)\n\n# Monitor disk usage (bioinformatics files are HUGE)\ndf -h                  # Disk space on all partitions\ndu -sh data/           # Size of data folder\ndu -sh * | sort -rh | head -10  # 10 biggest items\n\n# Screen: keep jobs running after you log out\nscreen -S rnaseq_run   # Start named session\n# ... run your pipeline ...\n# Ctrl+A then D          # Detach (job keeps running)\nscreen -r rnaseq_run   # Reattach later\n\n# SLURM (HPC job scheduler) — submit jobs to compute cluster\nsbatch job_script.sh   # Submit job\nsqueue -u username      # Check job status\nscancel 12345           # Cancel job\n\n# SLURM script header:\n#!/bin/bash\n#SBATCH --job-name=bwa_align\n#SBATCH --ntasks=8\n#SBATCH --mem=32G\n#SBATCH --time=04:00:00\n#SBATCH --output=logs/align_%j.log",
        why: "FASTQ files are 20–100GB. Alignment takes hours. You submit jobs to an HPC cluster with SLURM, detach with screen, and come back when done. du -sh tells you if you're about to run out of disk mid-analysis (very common!)." },
    ]

  {

    topics: [
      { name: "Regular Expressions (regex)", tag: "adv", tagCls: "tag-adv",
        desc: "Pattern matching in sequence IDs, file names, annotations",
        cmd: "# Basic regex patterns:\n# .    = any single character\n# *    = zero or more of previous\n# +    = one or more of previous\n# ^    = start of line\n# $    = end of line\n# [ATGC] = any one of A, T, G, C\n# [0-9]  = any digit\n\n# Extract read IDs from FASTQ\ngrep '^@' reads.fastq | grep -oP 'HWI-[A-Z0-9:]+'\n\n# Match chromosome names (chr1 to chr22, chrX, chrY)\ngrep -E '^chr([1-9]|1[0-9]|2[0-2]|X|Y)\\b' variants.vcf\n\n# Extract Ensembl gene IDs (ENSG + 11 digits)\ngrep -oE 'ENSG[0-9]{11}' annotation.gtf | sort -u\n\n# In awk — extract sample number from filename:\n# 'sample_023_R1.fastq' → '023'\necho 'sample_023_R1.fastq' | awk '{match($0, /sample_([0-9]+)/, arr); print arr[1]}'\n\n# Find all SNPs at position ending in 000 (multiples of 1000)\nawk '$2 % 1000 == 0' variants.vcf",
        why: "Gene IDs follow patterns (ENSG, NM_, BRCA). Chromosome names follow patterns (chr1-22,X,Y). Sequencer read IDs follow patterns. Regex lets you extract, validate, and filter based on biological ID conventions." },

      { name: "Snakemake — Workflow Manager", tag: "tool", tagCls: "tag-tool",
        desc: "Define rules, automatic dependency resolution, cluster-ready",
        cmd: "# Snakemake Snakefile — define rules, not steps\n# Snakemake figures out the ORDER automatically\n\nrule all:\n    input: expand('results/{sample}.counts.txt', sample=SAMPLES)\n\nrule align:\n    input:\n        r1='data/{sample}_R1.fastq.gz',\n        r2='data/{sample}_R2.fastq.gz'\n    output: 'aligned/{sample}.bam'\n    threads: 8\n    log: 'logs/align_{sample}.log'\n    shell:\n        'bwa mem -t {threads} ref.fa {input.r1} {input.r2} '\n        '| samtools sort -o {output} 2>{log}'\n\nrule count:\n    input: 'aligned/{sample}.bam'\n    output: 'results/{sample}.counts.txt'\n    shell:\n        'featureCounts -a genes.gtf -o {output} {input}'\n\n# Run the pipeline:\nsnakemake --cores 8                    # Locally\nsnakemake --cluster 'sbatch' --jobs 50 # On HPC cluster",
        why: "Snakemake is the professional standard. It automatically re-runs only failed steps, parallelizes across samples, and submits to HPC clusters. A paper analysis with 50 samples and 15 steps runs as one snakemake command." },

      { name: "Git — Version Control", tag: "tool", tagCls: "tag-tool",
        desc: "Track script changes, collaborate, never lose work",
        cmd: "# Initialize a git repository\ngit init my_rnaseq_project\ncd my_rnaseq_project\n\n# Track your scripts (NOT large data files!)\ngit add scripts/align.sh\ngit add scripts/variant_call.sh\ngit commit -m 'Add initial alignment and variant calling scripts'\n\n# Check what changed\ngit status\ngit diff scripts/align.sh\n\n# Go back to a previous version\ngit log --oneline\ngit checkout abc1234 scripts/align.sh\n\n# .gitignore — tell git to ignore large files\necho '*.fastq.gz' >> .gitignore\necho '*.bam' >> .gitignore\necho 'results/' >> .gitignore\n\n# Push to GitHub (share with collaborators/supervisor)\ngit remote add origin https://github.com/you/project.git\ngit push origin main",
        why: "You edit a working script, break it, and need the old version. Without git you guess what changed. With git you run git checkout. Reviewers and journal editors increasingly require scripts on GitHub for reproducibility." },

      { name: "Logging & Error Handling", tag: "adv", tagCls: "tag-adv",
        desc: "set -euo pipefail, timestamps, exit codes",
        cmd: "#!/bin/bash\n# ALWAYS start production scripts with these 3 lines:\nset -e      # Exit immediately if any command fails\nset -u      # Error on undefined variables\nset -o pipefail  # Catch errors in pipes\n\n# Structured logging with timestamps\nLOG_FILE='pipeline_$(date +%Y%m%d_%H%M%S).log'\n\nlog_info()  { echo \"[INFO]  $(date '+%H:%M:%S') $*\" | tee -a $LOG_FILE; }\nlog_warn()  { echo \"[WARN]  $(date '+%H:%M:%S') $*\" | tee -a $LOG_FILE; }\nlog_error() { echo \"[ERROR] $(date '+%H:%M:%S') $*\" | tee -a $LOG_FILE >&2; }\n\n# Trap — run cleanup even if script fails\ntrap 'log_error \"Pipeline failed at line $LINENO\"' ERR\ntrap 'log_info \"Done! Total time: $SECONDS seconds\"' EXIT\n\n# Check tool availability before running\nfor TOOL in bwa samtools fastqc; do\n  command -v $TOOL || { log_error \"$TOOL not found\"; exit 1; }\ndone\n\nlog_info 'Pipeline started'\nlog_info 'Aligning sample: '$SAMPLE",
        why: "A pipeline running overnight on 100 samples fails at sample 73 at 3am. set -e stops it immediately (not silently). The log file tells you exactly which line failed and why. This is the difference between research you can trust and research you cannot." },

      { name: "Shell Config & Environment", tag: "core", tagCls: "tag-core",
        desc: ".bashrc, aliases, PATH, environment variables",
        cmd: "# ~/.bashrc — your shell configuration file\n# Edit it: nano ~/.bashrc\n\n# Useful aliases (shortcuts)\nalias ll='ls -lhF --color=auto'\nalias la='ls -la'\nalias ..='cd ..'\nalias ...='cd ../..'\nalias gs='git status'\nalias mydata='cd /path/to/my/bioinformatics/data'\n\n# Add tools to PATH\nexport PATH=\"$HOME/tools/bin:$PATH\"\nexport PATH=\"$HOME/miniconda3/bin:$PATH\"\n\n# Set default number of threads\nexport THREADS=8\n\n# Useful function in .bashrc\ncount_reads() {\n  echo $(wc -l < \"$1\") / 4 | bc\n}\n# Usage: count_reads sample.fastq\n\n# Reload .bashrc after editing\nsource ~/.bashrc",
        why: "Typing 'ls -lhF --color=auto' 50 times a day is insane. Aliases make you 2x faster. Adding tools to PATH means they work everywhere. A good .bashrc setup saves 20 minutes every working day." },

      { name: "Statistics on the Command Line", tag: "stat", tagCls: "tag-stat",
        desc: "datamash, basic stats, distributions from the terminal",
        cmd: "# datamash — compute statistics on tabular data\n# Install: conda install -c bioconda datamash\n\n# Basic statistics on a column\ncut -f5 coverage.txt | datamash mean 1 median 1 stdev 1 min 1 max 1\n\n# Group statistics (like R's group_by + summarise)\ndatamash -H groupby 1 mean 2 stdev 2 < expression.tsv\n\n# Percentiles of read depths\ncut -f3 depth.txt | datamash perc:25 1 perc:75 1\n\n# Pure awk statistics (no extra install needed):\nawk '{sum+=$1; sumsq+=$1^2; n++} END {\n  mean=sum/n;\n  std=sqrt(sumsq/n - mean^2);\n  printf \"N=%d\\tMean=%.2f\\tSD=%.2f\\n\", n, mean, std\n}' coverage.txt\n\n# Distribution check — are values normally distributed?\nsort -n values.txt | awk 'NR==int(NF*0.25)' # Q1\nsort -n values.txt | awk 'NR==int(NF*0.5)'  # Median\nsort -n values.txt | awk 'NR==int(NF*0.75)' # Q3",
        why: "After alignment, you need: mean coverage depth, read count per sample, mapping rate per sample. These statistics decide whether a sample passes QC and enters downstream analysis. datamash does in one line what Python takes 10 lines to do." },
    ]
  }
];

let currentTopic = null;

function render() {
  const container = document.getElementById('phases');
  phases.forEach((phase, pi) => {
    const el = document.createElement('div');
    el.className = `phase ${phase.cls}`;
    el.innerHTML = `
      <div class="phase-header" onclick="toggle('body-${phase.id}', 'arrow-${phase.id}')">
        <div class="phase-badge">${phase.num}</div>
        <div class="phase-info">
          <div class="phase-title">${phase.title}</div>
          <div class="phase-meta">${phase.meta}</div>
          <div class="progress-bar-wrap"><div class="progress-bar" style="width:${phase.pct}%"></div></div>
        </div>
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-right:8px;white-space:nowrap">${phase.weeks}</div>
        <div class="phase-arrow" id="arrow-${phase.id}">&#9654;</div>
      </div>
      <div class="phase-body" id="body-${phase.id}">
        <div class="week-pill">${phase.weeks}</div>
        <div class="topic-grid">
          ${phase.topics.map((t,ti) => `
            <div class="topic-card" onclick="showModal('${phase.id}','${ti}')">
              <div class="topic-name">${t.name}</div>
              <div class="topic-desc">${t.desc}</div>
              <span class="topic-tag ${t.tagCls}">${t.tag}</span>
            </div>`).join('')}
        </div>
        <div class="note-box">${phase.note}</div>
      </div>`;
    container.appendChild(el);
  });
}

function toggle(bodyId, arrowId) {
  const body = document.getElementById(bodyId);
  const arrow = document.getElementById(arrowId);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function showModal(phaseId, topicIdx) {
  const phase = phases.find(p => p.id === phaseId);
  const topic = phase.topics[topicIdx];
  currentTopic = topic;
  document.getElementById('m-title').textContent = topic.name;
  document.getElementById('m-phase').textContent = `Phase ${phase.num} · ${phase.title} · ${phase.weeks}`;
  document.getElementById('m-cmd').textContent = topic.cmd;
  document.getElementById('m-why').textContent = 'Why this matters: ' + topic.why;
  document.getElementById('modal').classList.add('show');
}

function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('show');
}

function learnTopic() {
  if (!currentTopic) return;
  document.getElementById('modal').classList.remove('show');
  sendPrompt(`Teach me "${currentTopic.name}" in full detail. Cover: the concept from scratch, all commands with real bioinformatics examples, the statistics behind it, common mistakes, and practice exercises.`);
}

render();
// Open first phase by default
toggle('body-p1', 'arrow-p1');
</script>
